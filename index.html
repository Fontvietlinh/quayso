<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - Font Việt Linh</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #050a14;
            --primary: #36d7ff;
            --gold: #ffb703;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, #0f1f38, #050a14);
        }
        header { padding: 30px 20px 10px; text-align: center; }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(28px, 5vw, 48px);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: flex;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            gap: 50px;
            align-items: center;
            justify-content: center;
        }

        /* KHU VỰC VÒNG QUAY - Tối ưu kích thước cho PC */
        .wheel-section {
            flex: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .wheel-outer {
            position: relative;
            width: min(85vh, 650px); /* Tăng kích thước vòng quay trên PC */
            height: min(85vh, 650px);
            background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            border-radius: 50%;
            padding: 15px; /* Độ dày viền vàng */
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 20px rgba(255,183,3,0.3);
        }

        /* HỆ THỐNG ĐÈN LED */
        .led-container {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }
        .led {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: 50% 320px; /* Khớp với bán kính wheel-outer */
            box-shadow: 0 0 10px #fff, 0 0 20px var(--gold);
            animation: led-blink 1s infinite alternate;
        }
        @keyframes led-blink {
            0% { opacity: 0.5; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1.5); box-shadow: 0 0 15px var(--gold); }
        }

        .canvas-wrap {
            width: 100%;
            height: 100%;
            background: #0d1d35;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            will-change: transform;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        /* KIM CHỈ & NÚT QUAY */
        .pointer {
            position: absolute;
            top: 50%; right: -20px;
            transform: translateY(-50%);
            width: 80px; height: 50px;
            background: linear-gradient(to left, #ff3d71, #aa1238);
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            z-index: 10;
            filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.5));
            transition: 0.1s;
        }
        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110px; height: 110px;
            background: radial-gradient(circle at 30% 30%, #fff, var(--gold));
            border: 6px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; font-size: 24px; color: #3a2100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: 0.2s;
        }
        .spin-btn:active { transform: translate(-50%, -50%) scale(0.9); }

        /* THANH BÊN */
        .sidebar {
            flex: 0.7;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: rgba(15, 31, 56, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        textarea {
            width: 100%; height: 220px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px; color: #fff;
            font-size: 16px; outline: none; resize: none;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn {
            padding: 15px; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px;
        }
        .btn-main { grid-column: span 2; background: var(--primary); color: #000; }
        .btn-sec { background: rgba(255,255,255,0.05); color: #fff; }

        @media (max-width: 1100px) {
            .main-container { flex-direction: column; }
            .wheel-outer { width: 85vw; height: 85vw; padding: 10px; }
            .led { transform-origin: 50% 41.5vw; } /* Chỉnh LED cho mobile */
            .sidebar { max-width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vòng Quay May Mắn Font Việt Linh</h1>
</header>

<main class="main-container">
    <div class="wheel-section">
        <div class="wheel-outer" id="wheelOuter">
            <div class="led-container" id="ledContainer"></div>
            <div class="canvas-wrap">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
            </div>
            <div class="pointer" id="pointer"></div>
            <div class="spin-btn" id="spinBtn">QUAY</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h3 style="font-family:'Barlow Condensed'; margin-bottom:15px; letter-spacing:1px;">DANH SÁCH THAM GIA</h3>
            <textarea id="inputNames" placeholder="Nhập tên..."></textarea>
            <div class="btn-group">
                <button class="btn btn-main" onclick="shuffleNames()">XÁO TRỘN</button>
                <button class="btn btn-sec" onclick="resetDefault()">MẶC ĐỊNH</button>
                <button class="btn btn-sec" onclick="clearAll()">XÓA HẾT</button>
            </div>
        </div>
    </div>
</main>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const inputNames = document.getElementById('inputNames');
    const ledContainer = document.getElementById('ledContainer');
    const pointer = document.getElementById('pointer');
    const spinBtn = document.getElementById('spinBtn');

    const colors = ["#FF5A5F", "#3BCEAC", "#FFC857", "#2D93AD", "#9B5DE5", "#F15BB5", "#00BBF9", "#00F5D4", "#FCA311", "#E01A4F", "#06D6A0", "#118AB2"];
    let names = [];
    let currentRotation = 0;
    let isSpinning = false;

    // Tạo 24 bóng LED
    for (let i = 0; i < 24; i++) {
        const led = document.createElement('div');
        led.className = 'led';
        led.style.transform = `translateX(-50%) rotate(${i * 15}deg)`;
        led.style.animationDelay = `${i * 0.1}s`;
        ledContainer.appendChild(led);
    }

    // Âm thanh Tạch tạch
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        
        // Hiệu ứng Pointer giật
        pointer.style.transform = 'translateY(-50%) rotate(15deg)';
        setTimeout(() => pointer.style.transform = 'translateY(-50%) rotate(0deg)', 40);
    }

    function draw() {
        const cx = 400, cy = 400, r = 385;
        ctx.fillStyle = "#0d1d35";
        ctx.fillRect(0, 0, 800, 800);
        if (names.length === 0) return;

        const slice = (Math.PI * 2) / names.length;
        names.forEach((name, i) => {
            const angle = i * slice;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, angle, angle + slice);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle + slice / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = '900 40px "Barlow Condensed", sans-serif';
            ctx.fillText(name.substring(0, 15), r - 45, 12);
            ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || names.length === 0) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isSpinning = true;
        
        const extraRounds = 7 + Math.floor(Math.random() * 5);
        const stopAngle = Math.random() * Math.PI * 2;
        currentRotation += (extraRounds * Math.PI * 2) + stopAngle;

        canvas.style.transform = `rotate(${currentRotation}rad)`;

        // Logic âm thanh khớp với chuyển động
        let lastIdx = -1;
        const startTime = performance.now();
        const duration = 5000;

        function checkTick(now) {
            if (!isSpinning) return;
            const elapsed = now - startTime;
            if (elapsed < duration) {
                // Tính toán vị trí hiện tại của vòng quay để phát tiếng tạch
                const progress = elapsed / duration;
                const easeOut = 1 - Math.pow(1 - progress, 3); // Khớp với cubic-bezier
                const currentDeg = (currentRotation * easeOut * 180) / Math.PI;
                const sliceDeg = 360 / names.length;
                const currentIdx = Math.floor(currentDeg / sliceDeg);

                if (currentIdx !== lastIdx) {
                    playTick();
                    lastIdx = currentIdx;
                }
                requestAnimationFrame(checkTick);
            }
        }
        requestAnimationFrame(checkTick);

        setTimeout(() => {
            isSpinning = false;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            // Sau khi dừng, tính toán người thắng (giống logic trước)
            const final = currentRotation % (Math.PI * 2);
            const slice = (Math.PI * 2) / names.length;
            const idx = Math.floor((Math.PI * 2 - (final % (Math.PI * 2))) / slice) % names.length;
            
            Swal.fire({
                title: 'CHÚC MỪNG!',
                html: `<b style="font-size:32px; color:#ff3d71">${names[idx]}</b>`,
                icon: 'success',
                background: '#0f1f38', color: '#fff',
                confirmButtonText: 'OK'
            });
        }, 5100);
    }

    function update() {
        names = inputNames.value.split('\n').map(t => t.trim()).filter(t => t);
        draw();
    }
    function shuffleNames() { names.sort(() => Math.random() - 0.5); inputNames.value = names.join('\n'); update(); }
    function resetDefault() { inputNames.value = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi"; update(); }
    function clearAll() { inputNames.value = ""; update(); }

    spinBtn.onclick = spin;
    inputNames.oninput = update;
    resetDefault();
</script>
</body>
</html>
