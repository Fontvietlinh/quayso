<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay may mắn Font Việt Linh</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #07111f;
            --panel: rgba(12,24,44,0.80);
            --panel-border: rgba(255,255,255,0.09);
            --text: #eef4ff;
            --muted: #9fb3d9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Be Vietnam Pro', sans-serif; }
        html, body { min-height: 100%; }
        body {
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 14%, rgba(54,215,255,0.18), transparent 26%),
                radial-gradient(circle at 82% 10%, rgba(124,92,255,0.20), transparent 28%),
                radial-gradient(circle at 50% 105%, rgba(255,183,3,0.11), transparent 24%),
                linear-gradient(135deg, #07111f 0%, #0f1f38 50%, #162b4d 100%);
        }
        header {
            padding: 24px 20px 8px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        header h1 {
            font-family: 'Barlow Condensed', 'Be Vietnam Pro', sans-serif;
            font-size: clamp(26px, 3.8vw, 50px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 4px 18px rgba(124,92,255,0.35), 0 0 30px rgba(54,215,255,0.15);
        }
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex: 1;
            padding: 16px 34px 34px;
            gap: 32px;
            max-width: 1560px;
            margin: 0 auto;
            width: 100%;
            align-items: center;
            justify-content: center;
        }
        .wheel-section {
            flex: 1;
            min-width: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .wheel-stage {
            position: relative;
            width: min(76vh, 56vw);
            height: min(76vh, 56vw);
            min-width: 300px;
            min-height: 300px;
        }
        .wheel-glow {
            position: absolute;
            inset: 5%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,92,255,0.22), rgba(54,215,255,0.10) 45%, transparent 70%);
            filter: blur(30px);
            pointer-events: none;
        }
        .wheel-rim {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            box-shadow:
                0 28px 60px rgba(0,0,0,0.45),
                inset 0 2px 0 rgba(255,255,255,0.55),
                inset 0 -10px 20px rgba(122,73,0,0.35),
                0 0 0 1px rgba(255,255,255,0.18);
            pointer-events: none;
        }
        .wheel-canvas-wrap {
            position: absolute;
            inset: 7%;
            border-radius: 50%;
            overflow: hidden;
            background: #0d1d35;
            box-shadow:
                inset 0 18px 30px rgba(255,255,255,0.07),
                inset 0 -20px 28px rgba(0,0,0,0.40);
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            will-change: transform;
            transform: rotate(0deg) translateZ(0);
            display: block;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .led-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            pointer-events: none;
        }
        .led {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
            animation: ledPulse 1.4s infinite ease-in-out;
        }
        .spinning .led {
            animation: none;
        }
        @keyframes ledPulse {
            0%,100% { opacity: 0.5; transform: scale(0.88); }
            50%      { opacity: 1;   transform: scale(1.22); }
        }
        .pointer {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 90px;
            height: 58px;
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            background: linear-gradient(145deg, #fff0f3 0%, #ff7aa2 35%, #ff3d71 65%, #aa1238 100%);
            filter: drop-shadow(-8px 8px 12px rgba(0,0,0,0.40));
            z-index: 10;
        }
        .spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 124px;
            height: 124px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 2px;
            color: #3a2100;
            cursor: pointer;
            user-select: none;
            border: 7px solid rgba(255,255,255,0.90);
            background:
                radial-gradient(circle at 34% 30%, rgba(255,255,255,0.85), transparent 28%),
                radial-gradient(circle at 50% 40%, #fff8da, #ffd86b 38%, #ffb703 68%, #9f5a00 100%);
            box-shadow:
                0 18px 30px rgba(0,0,0,0.38),
                inset 0 3px 0 rgba(255,255,255,0.68),
                inset 0 -10px 18px rgba(109,63,0,0.28),
                0 0 26px rgba(255,200,65,0.24);
            z-index: 20;
            transition: transform 0.18s ease, filter 0.18s ease;
        }
        .spin-btn:hover  { transform: translate(-50%,-50%) scale(1.06); filter: brightness(1.05); }
        .spin-btn:active { transform: translate(-50%,-46%) scale(0.96); }
        .sidebar {
            width: 340px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 26px;
            backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.38);
        }
        .input-section {
            padding: 22px;
            display: flex;
            flex-direction: column;
            min-height: 62vh;
            max-height: 680px;
        }
        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .input-header h2 {
            font-family: 'Barlow Condensed', 'Be Vietnam Pro', sans-serif;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .count-badge {
            min-width: 46px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 13px;
            border-radius: 999px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #081120;
            background: linear-gradient(135deg, #8ee8ff, #36d7ff);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 8px 20px rgba(54,215,255,0.26);
        }
        textarea {
            flex: 1;
            width: 100%;
            background: rgba(7,17,31,0.65);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            resize: none;
            outline: none;
            line-height: 1.8;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.22);
        }
        textarea::placeholder { color: #6f85ad; }
        .controls {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.26), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn:hover  { transform: translateY(-2px); filter: brightness(1.05); }
        .btn:active { transform: translateY(2px); }
        .btn-shuffle {
            grid-column: span 2;
            background: linear-gradient(135deg, #16d9c0, #0aa37d);
            font-size: 15px;
            padding: 15px;
        }
        .btn-reset { background: linear-gradient(135deg, #ffbe55, #f07d16); }
        .btn-clear  { background: linear-gradient(135deg, #ff6b86, #db2449); }
        .links-section {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links-section a {
            display: block;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 14px;
            padding: 13px 14px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 18px rgba(0,0,0,0.18);
            transition: transform 0.18s, border-color 0.18s, color 0.18s;
        }
        .links-section a:hover {
            transform: translateY(-2px);
            border-color: rgba(54,215,255,0.35);
            color: #c8f4ff;
        }
        .btn-contact:hover { color: #ffd2df !important; }
        @media (max-width: 1100px) {
            .container { flex-direction: column; align-items: center; padding: 12px 20px 30px; }
            .sidebar { width: min(100%, 600px); }
            .wheel-stage { width: min(86vw, 560px); height: min(86vw, 560px); }
            .input-section { min-height: 380px; max-height: none; }
        }
        @media (max-width: 600px) {
            header { padding-top: 16px; }
            header h1 { letter-spacing: 1.5px; }
            .container { padding: 8px 12px 22px; gap: 18px; }
            .wheel-stage { width: min(92vw, 420px); height: min(92vw, 420px); min-width: 260px; min-height: 260px; }
            .pointer { right: -14px; width: 65px; height: 44px; }
            .spin-btn { width: 90px; height: 90px; font-size: 22px; border-width: 5px; }
            .links-section a { font-size: 13px; }
        }
        @media (max-width: 380px) {
            .controls { grid-template-columns: 1fr; }
            .btn-shuffle { grid-column: span 1; }
            .spin-btn { width: 76px; height: 76px; font-size: 18px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vòng Quay May Mắn Font Việt Linh</h1>
</header>

<main class="container">
    <div class="wheel-section">
        <div class="wheel-stage">
            <div class="wheel-glow"></div>
            <div class="wheel-rim"></div>
            <div class="wheel-canvas-wrap">
                <canvas id="canvas" width="1200" height="1200"></canvas>
            </div>
            <div class="led-ring" id="led-ring"></div>
            <div class="pointer" id="pointer"></div>
            <div class="spin-btn" id="spin-btn">QUAY</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="input-section glass-card">
            <div class="input-header">
                <h2>Danh Sách</h2>
                <span class="count-badge" id="entry-count">0</span>
            </div>
            <textarea id="names-input" placeholder="Nhập mỗi mục trên một dòng..."></textarea>
            <div class="controls">
                <button class="btn btn-shuffle" id="shuffle-btn">Xáo trộn danh sách</button>
                <button class="btn btn-reset" id="reset-btn">Mặc định</button>
                <button class="btn btn-clear" id="clear-btn">Xóa hết</button>
            </div>
        </div>
        <div class="links-section glass-card">
            <a href="https://docs.google.com/spreadsheets/d/1FJZfdUx50TFt2mWM11f9i2Lm8f2Bsxum/edit?usp=sharing&ouid=1.0875907886142684e+20&rtpof=true&sd=true" target="_blank">📚 Bộ font Việt Hoá 4500 Font</a>
            <a href="https://docs.google.com/spreadsheets/d/1LCw8ESaDGv3I9PAAimqbUHFhhIUR6CWmPdkkwObyQYY/edit?usp=sharing" target="_blank">🔥 Bộ font Việt hoá Tháng 1-T6/2026</a>
            <a href="#" id="btn-msg" class="btn-contact">💬 Nhắn tin cho Font Việt Linh</a>
        </div>
    </div>
</main>

<script>
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const namesInput  = document.getElementById('names-input');
    const entryCount  = document.getElementById('entry-count');
    const spinBtn     = document.getElementById('spin-btn');
    const pointer     = document.getElementById('pointer');
    const ledRingEl   = document.getElementById('led-ring');

    const colors = ["#FF5A5F","#3BCEAC","#FFC857","#2D93AD","#9B5DE5","#F15BB5","#00BBF9","#00F5D4","#FCA311","#E01A4F","#06D6A0","#118AB2"];
    const defaultNames = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi";

    let names        = [];
    let currentAngle = 0;
    let isSpinning   = false;
    let spinVelocity = 0;
    let animationFrame;

    const savedData = localStorage.getItem('fontVietLinh_wheelData_v2');
    namesInput.value = (savedData && savedData.trim() !== '') ? savedData : defaultNames;

    // ===== ÂM THANH =====
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    // Tiếng tạch nhẹ - như que gảy vào răng lược
    function playTickSound() {
        const ac  = getAudioCtx();
        const len = Math.floor(ac.sampleRate * 0.018);
        const buf = ac.createBuffer(1, len, ac.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < len; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 8);
        }
        const src = ac.createBufferSource();
        src.buffer = buf;
        const bpf = ac.createBiquadFilter();
        bpf.type  = 'bandpass';
        bpf.frequency.value = 900;
        bpf.Q.value = 2.5;
        const gain = ac.createGain();
        gain.gain.value = 0.55; // âm lượng nhỏ hơn
        src.connect(bpf); bpf.connect(gain); gain.connect(ac.destination);
        src.start();

        pointer.style.transition = 'transform 0.04s ease-out';
        pointer.style.transform  = 'translateY(-50%) rotate(12deg)';
        setTimeout(() => { pointer.style.transform = 'translateY(-50%) rotate(0deg)'; }, 40);
    }

    function playWinSound() {
        const ac = getAudioCtx();
        [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
            setTimeout(() => {
                const osc  = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, ac.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, ac.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);
                osc.start(); osc.stop(ac.currentTime + 1.5);
            }, i * 80);
        });
    }

    // ===== LED =====
    function buildLEDs() {
        ledRingEl.innerHTML = '';
        const total     = window.innerWidth <= 600 ? 20 : 28;
        const ledColors = ['#ffd86b','#36d7ff','#ff4db8','#9eff6b','#fff2b3'];
        const size      = ledRingEl.offsetWidth || 400;
        const r  = size / 2 - 4;
        const cx = size / 2;
        const cy = size / 2;
        for (let i = 0; i < total; i++) {
            const dot   = document.createElement('span');
            dot.className = 'led';
            const angle = (Math.PI * 2 * i) / total - Math.PI / 2;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            const col = ledColors[i % ledColors.length];
            dot.style.cssText = `left:${x-5.5}px;top:${y-5.5}px;color:${col};background:${col};animation-delay:${(i%8)*0.12}s;animation-duration:${1.1+(i%5)*0.18}s`;
            ledRingEl.appendChild(dot);
        }
    }

    // ===== VẼ VÒNG QUAY =====
    function adjustColor(hex, amt) {
        const n = parseInt(hex.replace('#',''), 16);
        const c = v => Math.max(0, Math.min(255, v + amt));
        return `rgb(${c((n>>16)&255)},${c((n>>8)&255)},${c(n&255)})`;
    }

    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (names.length === 0) return;
        const cx    = canvas.width  / 2;
        const cy    = canvas.height / 2;
        const R     = canvas.width  / 2 - 14;
        const slice = (2 * Math.PI) / names.length;

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI * 2);
        ctx.clip();

        for (let i = 0; i < names.length; i++) {
            const sa   = i * slice;
            const ea   = sa + slice;
            const mid  = sa + slice / 2;
            const base = colors[i % colors.length];
            const hx   = cx + Math.cos(mid) * R * 0.25;
            const hy   = cy + Math.sin(mid) * R * 0.25;

            const grad = ctx.createRadialGradient(hx, hy, R * 0.05, cx, cy, R);
            grad.addColorStop(0,   adjustColor(base,  48));
            grad.addColorStop(0.5, base);
            grad.addColorStop(1,   adjustColor(base, -58));

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, R, sa, ea);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.82)';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.save();
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,sa,ea); ctx.closePath(); ctx.clip();
            const gloss = ctx.createLinearGradient(cx, cy-R, cx, cy+R);
            gloss.addColorStop(0,    'rgba(255,255,255,0.20)');
            gloss.addColorStop(0.25, 'rgba(255,255,255,0.06)');
            gloss.addColorStop(1,    'rgba(0,0,0,0.09)');
            ctx.fillStyle = gloss;
            ctx.fillRect(cx-R, cy-R, R*2, R*2);
            ctx.restore();

            ctx.save();
            ctx.translate(cx, cy); ctx.rotate(mid);
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.font = '900 46px "Barlow Condensed","Be Vietnam Pro",Arial,sans-serif';
            ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 10;
            ctx.strokeStyle = 'rgba(0,0,0,0.32)'; ctx.lineWidth = 3;
            let txt = names[i];
            if (txt.length > 20) txt = txt.substring(0,18) + '...';
            ctx.strokeText(txt, R-52, 0);
            ctx.fillStyle = '#fff'; ctx.fillText(txt, R-52, 0);
            ctx.restore();
        }
        ctx.restore();

        const rimGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        rimGrad.addColorStop(0,   'rgba(255,255,255,0.65)');
        rimGrad.addColorStop(0.5, 'rgba(255,215,120,0.95)');
        rimGrad.addColorStop(1,   'rgba(140,74,0,0.90)');
        ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
        ctx.strokeStyle = rimGrad; ctx.lineWidth = 14; ctx.stroke();

        const hubGrad = ctx.createRadialGradient(cx-24, cy-24, 6, cx, cy, 85);
        hubGrad.addColorStop(0,   '#fff8da');
        hubGrad.addColorStop(0.4, '#ffd86b');
        hubGrad.addColorStop(0.7, '#ffb703');
        hubGrad.addColorStop(1,   '#9f5a00');
        ctx.beginPath(); ctx.arc(cx, cy, 76, 0, Math.PI*2);
        ctx.fillStyle = hubGrad;
        ctx.shadowColor = 'rgba(0,0,0,0.38)'; ctx.shadowBlur = 18;
        ctx.fill(); ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 7; ctx.stroke();
    }

    // ===== LOGIC =====
    function updateNames() {
        const text = namesInput.value;
        names = text.split('\n').map(n => n.trim()).filter(n => n.length > 0);
        entryCount.innerText = names.length;
        localStorage.setItem('fontVietLinh_wheelData_v2', text);
        currentAngle = 0;
        canvas.style.transform = 'rotate(0rad)';
        drawWheel();
    }

    function getCurrentIndex() {
        if (names.length === 0) return -1;
        const slice = (2 * Math.PI) / names.length;
        const norm  = ((2*Math.PI) - (currentAngle % (2*Math.PI)) + (2*Math.PI)) % (2*Math.PI);
        return Math.floor(norm / slice) % names.length;
    }

    function spinWheel() {
        if (isSpinning || names.length === 0) return;
        getAudioCtx();
        isSpinning   = true;
        spinVelocity = Math.random() * 0.2 + 0.6;
        spinBtn.style.pointerEvents = 'none';
        canvas.closest('.wheel-stage').classList.add('spinning');

        // Theo dõi slice bằng góc chuẩn hoá về [0, 2PI] - tránh lỗi khi angle lớn
        const sliceAngle = (2 * Math.PI) / names.length;
        let lastSliceIdx = -1;

        function getSliceAtPointer() {
            // Mũi tên ở bên phải (góc 0), tính slice nào đang ở đó
            const norm = ((2 * Math.PI) - (currentAngle % (2 * Math.PI)) + (2 * Math.PI)) % (2 * Math.PI);
            return Math.floor(norm / sliceAngle) % names.length;
        }

        function animate() {
            currentAngle += spinVelocity;
            // Giới hạn angle để tránh float overflow sau nhiều vòng
            if (currentAngle > 1000 * Math.PI) currentAngle -= 1000 * Math.PI;

            spinVelocity *= 0.991;
            canvas.style.transform = `rotate3d(0,0,1,${currentAngle}rad)`;

            // Tick âm thanh + mũi tên: dựa trên slice tại vị trí mũi tên, không phải angle tuyệt đối
            const curSlice = getSliceAtPointer();
            if (curSlice !== lastSliceIdx) {
                playTickSound();
                lastSliceIdx = curSlice;
            }

            if (spinVelocity > 0.003) {
                animationFrame = requestAnimationFrame(animate);
            } else {
                isSpinning   = false;
                currentAngle = currentAngle % (2 * Math.PI);
                cancelAnimationFrame(animationFrame);
                spinBtn.style.pointerEvents = 'auto';
                canvas.closest('.wheel-stage').classList.remove('spinning');
                canvas.style.transform = `rotate(${currentAngle}rad)`;
                setTimeout(announceWinner, 150);
            }
        }
        requestAnimationFrame(animate);
    }

    function announceWinner() {
        const idx    = getCurrentIndex();
        const winner = names[idx];
        playWinSound();
        confetti({ particleCount:220, spread:90, origin:{y:0.6}, colors:['#ffd86b','#36d7ff','#ff4db8','#ffffff','#7c5cff'] });
        Swal.fire({
            title: '🎉 XUẤT SẮC 🎉',
            html:  `Chúc mừng người may mắn:<br><br><strong style="font-size:34px;color:#ff5a5f">${winner}</strong>`,
            icon:  'success',
            showCancelButton: true,
            confirmButtonText: 'Loại người này',
            cancelButtonText:  'Giữ lại',
            confirmButtonColor: '#db2449',
            cancelButtonColor:  '#243b63',
            background: '#0f1f38', color: '#eef4ff'
        }).then(r => {
            if (r.isConfirmed) {
                names.splice(idx, 1);
                namesInput.value = names.join('\n');
                updateNames();
            }
        });
    }

    // ===== EVENTS =====
    namesInput.addEventListener('input', updateNames);
    spinBtn.addEventListener('click', spinWheel);

    document.getElementById('shuffle-btn').addEventListener('click', () => {
        if (isSpinning) return;
        let arr = namesInput.value.split('\n').filter(n => n.trim());
        for (let i = arr.length-1; i > 0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [arr[i],arr[j]] = [arr[j],arr[i]];
        }
        namesInput.value = arr.join('\n'); updateNames();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
        if (!isSpinning) { namesInput.value = ''; updateNames(); }
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        if (isSpinning) return;
        Swal.fire({
            title: 'Khôi phục?', text: 'Quay về danh sách 12 con giáp mặc định.',
            icon: 'question', showCancelButton: true,
            confirmButtonText: 'Khôi phục', confirmButtonColor: '#f07d16',
            background: '#0f1f38', color: '#eef4ff'
        }).then(r => { if (r.isConfirmed) { namesInput.value = defaultNames; updateNames(); } });
    });

    // Nhắn tin thông minh: mobile → m.me (app), desktop → facebook messages (web)
    document.getElementById('btn-msg').addEventListener('click', e => {
        e.preventDefault();
        const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
        const url = isMobile
            ? 'https://m.me/FontVietLinh'
            : 'https://www.facebook.com/messages/t/FontVietLinh';
        window.open(url, '_blank');
    });

    window.addEventListener('resize', buildLEDs);

    // ===== KHỞI TẠO =====
    updateNames();
    buildLEDs();

    window.addEventListener('load', () => { buildLEDs(); drawWheel(); });
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => { drawWheel(); });
    }
</script>
</body>
</html>
