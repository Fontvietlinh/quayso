<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay may mắn Font Việt Linh</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-1: #07111f;
            --bg-2: #0f1f38;
            --bg-3: #162b4d;
            --panel: rgba(12, 24, 44, 0.72);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text: #eef4ff;
            --muted: #9fb3d9;
            --gold-1: #fff2b3;
            --gold-2: #ffd86b;
            --gold-3: #ffb703;
            --gold-4: #b86a00;
            --accent: #7c5cff;
            --cyan: #36d7ff;
            --pink: #ff4db8;
            --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
            --soft-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 30px rgba(0,0,0,0.28);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Be Vietnam Pro', sans-serif; }

        html, body { min-height: 100%; }

        body {
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 20% 15%, rgba(54, 215, 255, 0.20), transparent 26%),
                radial-gradient(circle at 80% 10%, rgba(124, 92, 255, 0.22), transparent 28%),
                radial-gradient(circle at 50% 100%, rgba(255, 183, 3, 0.12), transparent 25%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: auto;
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 300px;
            height: 300px;
            top: 80px;
            left: -60px;
            background: rgba(54, 215, 255, 0.14);
        }

        body::after {
            width: 380px;
            height: 380px;
            right: -100px;
            bottom: 40px;
            background: rgba(255, 77, 184, 0.12);
        }

        header {
            position: relative;
            z-index: 1;
            padding: 26px 20px 10px;
            text-align: center;
        }

        header h1 {
            font-size: clamp(28px, 4vw, 52px);
            font-weight: 900;
            font-family: 'Barlow Condensed', 'Be Vietnam Pro', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 4px 18px rgba(124, 92, 255, 0.35), 0 0 30px rgba(54, 215, 255, 0.15);
        }



        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex: 1;
            padding: 10px 34px 34px;
            gap: 32px;
            max-width: 1560px;
            margin: 0 auto;
            width: 100%;
            align-items: stretch;
            justify-content: center;
        }

        .wheel-section {
            flex: 1;
            min-width: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 8px;
        }

        .wheel-stage {
            position: relative;
            width: min(78vh, 58vw);
            height: min(78vh, 58vw);
            min-width: 320px;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            isolation: isolate;
        }

        .wheel-stage::before {
            content: '';
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 92, 255, 0.22), rgba(54, 215, 255, 0.08) 45%, transparent 70%);
            filter: blur(28px);
            z-index: 0;
        }

        .wheel-glow-ring,
        .wheel-outer-rim,
        .wheel-inner-rim,
        .led-ring,
        .pointer,
        .spin-btn,
        .hub-highlight,

        .wheel-glow-ring {
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(255, 183, 3, 0.26), rgba(255,255,255,0.06), rgba(54,215,255,0.22), rgba(255,77,184,0.18), rgba(255,183,3,0.26));
            filter: blur(28px);
            opacity: 0.8;
            z-index: 0;
            animation: haloSpin 12s linear infinite;
        }

        .wheel-outer-rim {
            inset: 1.6%;
            border-radius: 50%;
            padding: 20px;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.24), rgba(255,255,255,0.03)),
                conic-gradient(from 180deg, #fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            box-shadow:
                0 28px 60px rgba(0, 0, 0, 0.42),
                inset 0 2px 0 rgba(255,255,255,0.55),
                inset 0 -12px 24px rgba(122, 73, 0, 0.35),
                0 0 0 1px rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .wheel-outer-rim::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.22), transparent 45%), linear-gradient(145deg, rgba(255,255,255,0.12), rgba(0,0,0,0.08));
            pointer-events: none;
        }

        .wheel-inner-rim {
            inset: 6.4%;
            border-radius: 50%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 40%, #19345d 0%, #0d1d35 62%, #081120 100%);
            box-shadow:
                inset 0 18px 30px rgba(255,255,255,0.08),
                inset 0 -22px 30px rgba(0,0,0,0.42),
                0 10px 30px rgba(0,0,0,0.3);
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            will-change: transform;
            transform: rotate(0deg);
            filter: drop-shadow(0 12px 24px rgba(0,0,0,0.25));
        }

        .hub-highlight {
            left: 50%;
            top: 50%;
            width: 170px;
            height: 170px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.45), transparent 35%), radial-gradient(circle, rgba(255,216,107,0.20), transparent 70%);
            z-index: 3;
            pointer-events: none;
        }

        .led-ring {
            inset: -6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
        }

        .led {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 12px currentColor, 0 0 22px currentColor;
            animation: ledPulse 1.4s infinite ease-in-out;
        }

        .pointer {
            top: 50%;
            right: -24px;
            transform: translateY(-50%);
            width: 106px;
            height: 64px;
            z-index: 8;
            filter: drop-shadow(-10px 10px 14px rgba(0,0,0,0.38));
        }

        .pointer::before,
        .pointer::after {
            content: '';
            position: absolute;
            inset: 0;
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            border-radius: 10px;
        }

        .pointer::before {
            background: linear-gradient(145deg, #fff0f3 0%, #ff7aa2 35%, #ff3d71 65%, #aa1238 100%);
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), inset 0 -8px 12px rgba(0,0,0,0.18);
        }

        .pointer::after {
            inset: 12px 16px 12px 10px;
            background: linear-gradient(145deg, #fff6c8, #ffd86b 45%, #ffb703 70%, #c57100 100%);
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            filter: saturate(1.15);
        }

        .spin-btn {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 132px;
            height: 132px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 30px;
            letter-spacing: 2px;
            color: #392100;
            cursor: pointer;
            user-select: none;
            border: 8px solid rgba(255,255,255,0.92);
            background:
                radial-gradient(circle at 35% 30%, rgba(255,255,255,0.88), transparent 28%),
                radial-gradient(circle at 50% 35%, var(--gold-1), var(--gold-2) 35%, var(--gold-3) 65%, var(--gold-4) 100%);
            box-shadow:
                0 20px 32px rgba(0,0,0,0.35),
                inset 0 3px 0 rgba(255,255,255,0.7),
                inset 0 -10px 18px rgba(109,63,0,0.28),
                0 0 0 10px rgba(255,255,255,0.08),
                0 0 28px rgba(255, 200, 65, 0.25);
            z-index: 10;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .spin-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            filter: brightness(1.04);
            box-shadow:
                0 24px 38px rgba(0,0,0,0.4),
                inset 0 3px 0 rgba(255,255,255,0.74),
                inset 0 -10px 18px rgba(109,63,0,0.28),
                0 0 0 12px rgba(255,255,255,0.08),
                0 0 36px rgba(255, 200, 65, 0.34);
        }

        .spin-btn:active {
            transform: translate(-50%, -47%) scale(0.97);
        }

        .sidebar {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .input-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 22px;
            min-height: 65vh;
            max-height: 680px;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 14px;
        }

        .input-header h2 {
            font-size: 20px;
            font-weight: 900;
            font-family: 'Barlow Condensed', 'Be Vietnam Pro', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .count-badge {
            min-width: 48px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 900;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 1px;
            color: #081120;
            background: linear-gradient(135deg, #8ee8ff, #36d7ff);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 10px 22px rgba(54, 215, 255, 0.28);
        }

        textarea {
            flex: 1;
            width: 100%;
            background: rgba(7, 17, 31, 0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 16px 18px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            resize: none;
            outline: none;
            line-height: 1.8;
            box-shadow: inset 0 8px 20px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        textarea::placeholder { color: #6f85ad; }

        .controls {
            margin-top: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 900;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.16s ease;
            box-shadow: 0 12px 22px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.04); }
        .btn:active { transform: translateY(2px); }

        .btn-shuffle {
            grid-column: span 2;
            background: linear-gradient(135deg, #16d9c0, #0aa37d);
            box-shadow: 0 12px 22px rgba(8, 185, 142, 0.28), inset 0 1px 0 rgba(255,255,255,0.25);
            font-size: 15px;
            padding: 16px;
        }

        .btn-reset {
            background: linear-gradient(135deg, #ffbe55, #f07d16);
            box-shadow: 0 12px 22px rgba(240, 125, 22, 0.26), inset 0 1px 0 rgba(255,255,255,0.24);
        }

        .btn-clear {
            background: linear-gradient(135deg, #ff6b86, #db2449);
            box-shadow: 0 12px 22px rgba(219, 36, 73, 0.24), inset 0 1px 0 rgba(255,255,255,0.24);
        }

        .links-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 18px;
        }

        .links-section a {
            display: block;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-weight: 800;
            font-size: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 12px 20px rgba(0,0,0,0.18);
            transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }

        .links-section a:hover {
            transform: translateY(-2px);
            border-color: rgba(54, 215, 255, 0.35);
            color: #c8f4ff;
            background: linear-gradient(135deg, rgba(54,215,255,0.12), rgba(124,92,255,0.10));
        }

        .btn-contact:hover { color: #ffd2df !important; }


        @keyframes ledPulse {
            0%, 100% { transform: scale(0.9); opacity: 0.55; }
            50% { transform: scale(1.25); opacity: 1; }
        }

        @keyframes haloSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1100px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .sidebar {
                width: min(100%, 760px);
            }

            .wheel-stage {
                width: min(88vw, 760px);
                height: min(88vw, 760px);
            }

            .input-section {
                min-height: 420px;
                max-height: none;
            }
        }

        @media (max-width: 720px) {
            header { padding-top: 18px; }
            header h1 { letter-spacing: 1.5px; }
            .container { padding: 8px 14px 24px; gap: 22px; }
            .wheel-stage {
                width: min(92vw, 480px);
                height: min(92vw, 480px);
                min-width: 280px;
                min-height: 280px;
            }
            .wheel-outer-rim { padding: 14px; }
            .pointer {
                right: -15px;
                width: 70px;
                height: 46px;
            }
            .spin-btn {
                width: 96px;
                height: 96px;
                font-size: 22px;
                border-width: 6px;
            }
            .hub-highlight {
                width: 120px;
                height: 120px;
            }
            .controls {
                grid-template-columns: 1fr 1fr;
            }
            .btn-shuffle { grid-column: span 2; }
            .input-section,
            .links-section { border-radius: 22px; }
            .links-section a { font-size: 13px; padding: 13px 12px; }
            .sidebar { gap: 16px; }
        }

        @media (max-width: 400px) {
            .controls { grid-template-columns: 1fr; }
            .btn-shuffle { grid-column: span 1; }
            .spin-btn { width: 80px; height: 80px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Vòng Quay May Mắn Font Việt Linh</h1>

    </header>

    <main class="container">
        <div class="wheel-section">
            <div class="wheel-stage">
                <div class="wheel-glow-ring"></div>
                <div class="wheel-outer-rim"></div>
                <div class="wheel-inner-rim">
                    <canvas id="canvas" width="1200" height="1200"></canvas>
                </div>
                <div class="hub-highlight"></div>
                <div class="led-ring" id="led-ring"></div>
                <div class="pointer" id="pointer"></div>
                <div class="spin-btn" id="spin-btn">QUAY</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="input-section glass-card">
                <div class="input-header">
                    <h2>Danh Sách</h2>
                    <span class="count-badge" id="entry-count">0</span>
                </div>
                <textarea id="names-input" placeholder="Nhập mỗi mục trên một dòng..."></textarea>
                <div class="controls">
                    <button class="btn btn-shuffle" id="shuffle-btn">Xáo trộn danh sách</button>
                    <button class="btn btn-reset" id="reset-btn">Mặc định</button>
                    <button class="btn btn-clear" id="clear-btn">Xóa hết</button>
                </div>
            </div>

            <div class="links-section glass-card">
                <a href="https://docs.google.com/spreadsheets/d/1FJZfdUx50TFt2mWM11f9i2Lm8f2Bsxum/edit?usp=sharing&ouid=1.0875907886142684e+20&rtpof=true&sd=true" target="_blank">📚 Bộ font Việt Hoá 4500 Font</a>
                <a href="https://docs.google.com/spreadsheets/d/1LCw8ESaDGv3I9PAAimqbUHFhhIUR6CWmPdkkwObyQYY/edit?usp=sharing" target="_blank">🔥 Bộ font Việt hoá Tháng 1-T6/2026</a>
                <a href="https://m.me/FontVietLinh" target="_blank" class="btn-contact">💬 Nhắn tin cho Font Việt Linh</a>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('names-input');
        const entryCount = document.getElementById('entry-count');
        const spinBtn = document.getElementById('spin-btn');
        const pointer = document.getElementById('pointer');
        const ledRing = document.getElementById('led-ring');

        const colors = ["#FF5A5F", "#3BCEAC", "#FFC857", "#2D93AD", "#9B5DE5", "#F15BB5", "#00BBF9", "#00F5D4", "#FCA311", "#E01A4F", "#06D6A0", "#118AB2"];
        const defaultNames = "Tý
Sửu
Dần
Mão
Thìn
Tỵ
Ngọ
Mùi
Thân
Dậu
Tuất
Hợi";

        let names = [];
        let currentAngle = 0;
        let isSpinning = false;
        let spinVelocity = 0;
        let animationFrame;

        const savedData = localStorage.getItem('fontVietLinh_wheelData_v2');
        namesInput.value = (savedData !== null && savedData.trim() !== '') ? savedData : defaultNames;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function buildLEDs() {
            ledRing.innerHTML = '';
            const total = window.innerWidth <= 720 ? 24 : 32;
            const colorsLed = ['#ffd86b', '#36d7ff', '#ff4db8', '#9eff6b', '#fff2b3'];
            const box = ledRing.getBoundingClientRect();
            const size = box.width || ledRing.offsetWidth || 600;
            const radius = size / 2 - 10;
            const center = size / 2;

            for (let i = 0; i < total; i++) {
                const dot = document.createElement('span');
                dot.className = 'led';
                const angle = (Math.PI * 2 * i) / total - Math.PI / 2;
                const x = center + Math.cos(angle) * radius;
                const y = center + Math.sin(angle) * radius;
                const color = colorsLed[i % colorsLed.length];
                dot.style.left = `${x - 6}px`;
                dot.style.top = `${y - 6}px`;
                dot.style.color = color;
                dot.style.background = color;
                dot.style.animationDelay = `${(i % 8) * 0.12}s`;
                dot.style.animationDuration = `${1.1 + (i % 5) * 0.18}s`;
                ledRing.appendChild(dot);
            }
        }

        function hexToRgb(hex) {
            const clean = hex.replace('#', '');
            const bigint = parseInt(clean, 16);
            return {
                r: (bigint >> 16) & 255,
                g: (bigint >> 8) & 255,
                b: bigint & 255
            };
        }

        function adjustColor(hex, amount) {
            const { r, g, b } = hexToRgb(hex);
            const clamp = (v) => Math.max(0, Math.min(255, v));
            return `rgb(${clamp(r + amount)}, ${clamp(g + amount)}, ${clamp(b + amount)})`;
        }

        function playTickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);

            pointer.style.transition = 'transform 0.04s ease-out';
            pointer.style.transform = 'translateY(-50%) rotate(14deg) scale(0.98)';
            setTimeout(() => {
                pointer.style.transform = 'translateY(-50%) rotate(0deg) scale(1)';
            }, 40);
        }

        function playWinSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const chords = [523.25, 659.25, 783.99, 1046.5];
            chords.forEach((freq, index) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 1.5);
                }, index * 80);
            });
        }

        function updateNames() {
            const text = namesInput.value;
            names = text.split('
').map(n => n.trim()).filter(n => n.length > 0);
            entryCount.innerText = names.length;
            localStorage.setItem('fontVietLinh_wheelData_v2', text);
            currentAngle = 0;
            canvas.style.transform = `rotate(0rad)`;
            drawWheel();
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 18;

            if (names.length === 0) return;

            const sliceAngle = (2 * Math.PI) / names.length;

            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.clip();

            for (let i = 0; i < names.length; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = startAngle + sliceAngle;
                const base = colors[i % colors.length];
                const light = adjustColor(base, 45);
                const dark = adjustColor(base, -55);
                const midX = centerX + Math.cos(startAngle + sliceAngle / 2) * radius * 0.25;
                const midY = centerY + Math.sin(startAngle + sliceAngle / 2) * radius * 0.25;

                const grad = ctx.createRadialGradient(midX, midY, radius * 0.06, centerX, centerY, radius);
                grad.addColorStop(0, light);
                grad.addColorStop(0.48, base);
                grad.addColorStop(1, dark);

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.lineWidth = 5;
                ctx.stroke();

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.clip();

                const gloss = ctx.createLinearGradient(centerX, centerY - radius, centerX, centerY + radius);
                gloss.addColorStop(0, 'rgba(255,255,255,0.22)');
                gloss.addColorStop(0.28, 'rgba(255,255,255,0.07)');
                gloss.addColorStop(0.6, 'rgba(255,255,255,0.00)');
                gloss.addColorStop(1, 'rgba(0,0,0,0.10)');
                ctx.fillStyle = gloss;
                ctx.fillRect(centerX - radius, centerY - radius, radius * 2, radius * 2);
                ctx.restore();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = '900 48px "Barlow Condensed", "Be Vietnam Pro", sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.55)';
                ctx.shadowBlur = 10;
                ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                ctx.lineWidth = 3;
                let text = names[i];
                if (text.length > 20) text = text.substring(0, 18) + '...';
                ctx.strokeText(text, radius - 54, 0);
                ctx.fillText(text, radius - 54, 0);
                ctx.restore();
            }
            ctx.restore();

            const outerStroke = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            outerStroke.addColorStop(0, 'rgba(255,255,255,0.7)');
            outerStroke.addColorStop(0.5, 'rgba(255,215,120,0.95)');
            outerStroke.addColorStop(1, 'rgba(140,74,0,0.95)');
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = outerStroke;
            ctx.lineWidth = 12;
            ctx.stroke();

            ctx.beginPath();
            const hubGrad = ctx.createRadialGradient(centerX - 26, centerY - 26, 8, centerX, centerY, 90);
            hubGrad.addColorStop(0, '#fff8da');
            hubGrad.addColorStop(0.38, '#ffd86b');
            hubGrad.addColorStop(0.7, '#ffb703');
            hubGrad.addColorStop(1, '#9f5a00');
            ctx.arc(centerX, centerY, 78, 0, Math.PI * 2);
            ctx.fillStyle = hubGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.35)';
            ctx.shadowBlur = 18;
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.lineWidth = 8;
            ctx.strokeStyle = 'rgba(255,255,255,0.58)';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 48, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fill();
        }

        function getCurrentIndex() {
            if (names.length === 0) return -1;
            const sliceAngle = (2 * Math.PI) / names.length;
            const normalizedAngle = (currentAngle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            return Math.floor(((2 * Math.PI - normalizedAngle) % (2 * Math.PI)) / sliceAngle);
        }

        function spinWheel() {
            if (isSpinning || names.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isSpinning = true;
            spinVelocity = Math.random() * 0.2 + 0.6;
            let lastPassedSlice = -1;
            spinBtn.style.pointerEvents = 'none';
            spinBtn.style.filter = 'brightness(1.05) saturate(1.1)';

            function animate() {
                currentAngle += spinVelocity;
                spinVelocity *= 0.991;
                canvas.style.transform = `rotate(${currentAngle}rad)`;

                const sliceAngle = (2 * Math.PI) / names.length;
                const currentSlice = Math.floor(currentAngle / sliceAngle);
                if (currentSlice !== lastPassedSlice) {
                    playTickSound();
                    lastPassedSlice = currentSlice;
                }

                if (spinVelocity > 0.0015) {
                    animationFrame = requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    currentAngle = currentAngle % (2 * Math.PI);
                    cancelAnimationFrame(animationFrame);
                    spinBtn.style.pointerEvents = 'auto';
                    spinBtn.style.filter = 'none';
                    announceWinner();
                }
            }
            animate();
        }

        function announceWinner() {
            const winnerIndex = getCurrentIndex();
            const winner = names[winnerIndex];
            playWinSound();
            confetti({
                particleCount: 220,
                spread: 90,
                origin: { y: 0.62 },
                colors: ['#ffd86b', '#36d7ff', '#ff4db8', '#ffffff', '#7c5cff']
            });

            Swal.fire({
                title: '🎉 XUẤT SẮC 🎉',
                html: `Chúc mừng người may mắn:<br><br><strong style="font-size: 35px; color: #ff5a5f;">${winner}</strong>`,
                icon: 'success',
                showCancelButton: true,
                confirmButtonText: 'Loại người này',
                cancelButtonText: 'Giữ lại',
                confirmButtonColor: '#db2449',
                cancelButtonColor: '#243b63',
                background: '#0f1f38',
                color: '#eef4ff'
            }).then((result) => {
                if (result.isConfirmed) {
                    names.splice(winnerIndex, 1);
                    namesInput.value = names.join('
');
                    updateNames();
                }
            });
        }

        namesInput.addEventListener('input', updateNames);
        spinBtn.addEventListener('click', spinWheel);

        document.getElementById('shuffle-btn').addEventListener('click', () => {
            if (isSpinning) return;
            let arr = namesInput.value.split('
').filter(n => n.trim() !== '');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            namesInput.value = arr.join('
');
            updateNames();
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (!isSpinning) {
                namesInput.value = '';
                updateNames();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (isSpinning) return;
            Swal.fire({
                title: 'Khôi phục?',
                text: 'Quay về danh sách 12 con giáp mặc định.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Khôi phục',
                confirmButtonColor: '#f07d16',
                background: '#0f1f38',
                color: '#eef4ff'
            }).then((result) => {
                if (result.isConfirmed) {
                    namesInput.value = defaultNames;
                    updateNames();
                }
            });
        });

        window.addEventListener('resize', buildLEDs);
        Promise.all([document.fonts.load('1em "Be Vietnam Pro"'), document.fonts.load('1em "Barlow Condensed"')]).then(() => {
            buildLEDs();
            updateNames();
        });
        window.onload = () => {
            buildLEDs();
            updateNames();
        };
    </script>
</body>
</html>
