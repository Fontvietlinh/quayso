<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vòng Quay May Mắn - Font Việt Linh</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FontViệtLinh">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #050a14; --primary: #36d7ff; --gold: #ffb703; --panel: rgba(15, 31, 56, 0.95);
            --font-main: 'Roboto Condensed', sans-serif; --font-heading: 'Barlow Condensed', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-main); background: var(--bg); color: #fff;
            min-height: 100vh; display: flex; flex-direction: column;
            background: radial-gradient(circle at top, #0f1f38, #050a14);
            overflow: hidden; font-weight: 700;
        }
        header { padding: 15px 10px; text-align: center; }
        header h1 {
            font-family: var(--font-heading); font-size: clamp(24px, 5vw, 48px);
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(180deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1;
        }
        header h1 span { display: block; font-size: 1em; margin-top: 5px; -webkit-text-fill-color: transparent; }
        .main-container { display: flex; flex: 1; max-width: 1900px; margin: 0 auto; width: 100%; padding: 0 30px 20px; gap: 40px; align-items: center; justify-content: center; }
        .wheel-section { flex: 2; display: flex; justify-content: center; align-items: center; position: relative; }
        .wheel-outer { position: relative; width: min(85vh, 760px); height: min(85vh, 760px); background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2); border-radius: 50%; padding: 12px; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .led-container { position: absolute; inset: 0; border-radius: 50%; z-index: 5; pointer-events: none; }
        .led { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 2px; left: 50%; transform: translateX(-50%); transform-origin: 50% 380px; box-shadow: 0 0 15px #fff, 0 0 25px var(--gold); animation: led-flash 0.4s infinite alternate; }
        @keyframes led-flash { 0% { opacity: 0.2; filter: brightness(0.5); } 100% { opacity: 1; filter: brightness(2); box-shadow: 0 0 20px #fff, 0 0 40px var(--primary); } }
        .canvas-wrap { width: 100%; height: 100%; background: #0d1d35; border-radius: 50%; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; will-change: transform; transition: transform 9.5s cubic-bezier(0.15, 0, 0, 1); }
        .pointer { position: absolute; top: 50%; right: -35px; transform: translateY(-50%); width: 85px; height: 55px; background: linear-gradient(to left, #ff3d71, #aa1238); clip-path: polygon(0 50%, 100% 0, 100% 100%); z-index: 10; transform-origin: center right; }
        .spin-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; background: radial-gradient(circle at 30% 30%, #fff, var(--gold)); border: 7px solid #fff; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 900; font-size: 32px; color: #3a2100; box-shadow: 0 15px 45px rgba(0,0,0,0.7); transition: 0.2s; }
        .sidebar { flex: 0.8; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 26px; padding: 22px; }
        textarea { width: 100%; height: 210px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 15px; color: #fff; font-size: 16px; outline: none; resize: none; line-height: 1.6; font-family: var(--font-main); font-weight: 700; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; font-family: var(--font-main); }
        .btn-main { grid-column: span 2; background: var(--primary); color: #000; font-size: 15px; }
        .btn-sec { background: rgba(255,255,255,0.08); color: #fff; }
        .link-item { display: block; padding: 14px 20px; background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; text-decoration: none; text-align: left; font-weight: 700; font-size: 13.5px; margin-bottom: 10px; transition: 0.2s; font-family: var(--font-main); }
        @media (max-width: 1100px) { .main-container { flex-direction: column; padding: 10px; } .wheel-outer { width: 92vw; height: 92vw; } .led { transform-origin: 50% 46vw; width: 10px; height: 10px; } .spin-btn { width: 95px; height: 95px; font-size: 20px; } .sidebar { max-width: 100%; padding-bottom: 60px; } body { overflow-y: auto; } }
    </style>
</head>
<body>
<header><h1>Vòng Quay May Mắn <span>Font Việt Linh</span></h1></header>
<main class="main-container">
    <div class="wheel-section">
        <div class="wheel-outer" id="outerFrame">
            <div class="led-container" id="ledContainer"></div>
            <div class="canvas-wrap"><canvas id="wheelCanvas" width="800" height="800"></canvas></div>
            <div class="pointer" id="pointer"></div>
            <div class="spin-btn" id="spinBtn">QUAY</div>
        </div>
    </div>
    <div class="sidebar">
        <div class="card">
            <h3 style="margin-bottom: 12px; text-transform: uppercase;">DANH SÁCH <span id="count" style="color:var(--primary)">0</span></h3>
            <textarea id="inputNames" placeholder="Nhập tên..."></textarea>
            <div class="btn-group">
                <button class="btn btn-main" onclick="shuffleNames()">XÁO TRỘN DANH SÁCH</button>
                <button class="btn btn-sec" onclick="resetDefault()">MẶC ĐỊNH</button>
                <button class="btn btn-sec" onclick="clearAll()">XÓA HẾT</button>
            </div>
        </div>
        <div class="card">
            <a href="https://www.facebook.com/FontVietLinh/posts/pfbid0MWivFBhBXuVrmKdFYGuSuFwfukbkymsUTNXYzLSjq9yXBpTrVHV9ptB8EpX5K75Pl" target="_blank" class="link-item">📚 BỘ FONT VIỆT HOÁ 4500 FONT</a>
            <a href="https://www.facebook.com/FontVietLinh/posts/pfbid027atrjbP17e3oxf6rVnc9t8Vn7enzhfjxFHgeAK9zhL51EZeyRT6BvXFVKzitaqMTl" target="_blank" class="link-item">🔥 BỘ FONT VIỆT HOÁ T6/2026</a>
            <button id="btn-msg" class="link-item" style="width:100%; border:1px solid #ff7aa2; color:#ff7aa2; background:none;">💬 NHẮN TIN CHO FONT VIỆT LINH</button>
        </div>
    </div>
</main>
<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const inputNames = document.getElementById('inputNames');
    const pointer = document.getElementById('pointer');
    const spinBtn = document.getElementById('spinBtn');
    const ledContainer = document.getElementById('ledContainer');
    const colors = ["#FF5A5F", "#3BCEAC", "#FFC857", "#2D93AD", "#9B5DE5", "#F15BB5", "#00BBF9", "#00F5D4", "#FCA311", "#E01A4F", "#06D6A0", "#118AB2"];
    const defaultData = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi";
    let names = []; let currentRotation = 0; let isSpinning = false;

    // QUAN TRỌNG: Khởi tạo audio vỗ tay
    const applaudAudio = new Audio('votay.mp3');
    applaudAudio.load();

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playMetalTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const startTime = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
        osc.type = 'sine'; osc.frequency.setValueAtTime(2800, startTime); osc.frequency.exponentialRampToValueAtTime(1200, startTime + 0.03);
        filter.type = 'highpass'; filter.frequency.value = 1500;
        gain.gain.setValueAtTime(0.5, startTime); gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.03);
        osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(startTime + 0.03);
        pointer.style.transition = 'none'; pointer.style.transform = 'translateY(-50%) rotate(22deg)';
        pointer.offsetHeight; pointer.style.transition = 'transform 0.04s ease-out'; pointer.style.transform = 'translateY(-50%) rotate(0deg)';
    }

    function draw() {
        ctx.fillStyle = "#0d1d35"; ctx.fillRect(0, 0, 800, 800);
        if (names.length === 0) return;
        const slice = (Math.PI * 2) / names.length;
        names.forEach((name, i) => {
            const angle = i * slice; ctx.beginPath(); ctx.moveTo(400, 400); ctx.arc(400, 400, 395, angle, angle + slice);
            ctx.fillStyle = colors[i % colors.length]; ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
            ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + slice / 2); ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = '700 36px "Roboto Condensed", sans-serif'; ctx.fillText(name.substring(0, 18), 355, 12); ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || names.length === 0) return;
        
        // MỒI AUDIO: Phát câm ngay lúc bấm nút để trình duyệt cấp quyền
        applaudAudio.volume = 0;
        applaudAudio.play().then(() => {
            applaudAudio.pause();
            applaudAudio.currentTime = 0;
        }).catch(e => console.log("Audio mồi bị chặn"));

        isSpinning = true;
        const rounds = 12 + Math.floor(Math.random() * 5); 
        const stopAngle = Math.random() * Math.PI * 2;
        const targetRotation = currentRotation + (rounds * Math.PI * 2) + stopAngle;
        canvas.style.transition = "transform 9.5s cubic-bezier(0.15, 0, 0, 1)";
        canvas.style.transform = `rotate(${targetRotation}rad)`;

        let lastSliceIdx = -1;
        function monitor() {
            if (!isSpinning) return;
            const style = window.getComputedStyle(canvas);
            const matrix = style.transform || style.webkitTransform;
            if (matrix && matrix !== 'none') {
                const values = matrix.split('(')[1].split(')')[0].split(',');
                let angle = Math.atan2(values[1], values[0]);
                if (angle < 0) angle += (Math.PI * 2);
                const sliceAngle = (Math.PI * 2) / names.length;
                const normalized = (Math.PI * 2 - (angle % (Math.PI * 2))) % (Math.PI * 2);
                const currentIdx = Math.floor(normalized / sliceAngle);
                if (currentIdx !== lastSliceIdx) {
                    if (lastSliceIdx !== -1) playMetalTick();
                    lastSliceIdx = currentIdx;
                }
            }
            requestAnimationFrame(monitor);
        }
        requestAnimationFrame(monitor);

        setTimeout(() => {
            isSpinning = false; currentRotation = targetRotation;
            const finalAngle = (Math.PI * 2 - (currentRotation % (Math.PI * 2))) % (Math.PI * 2);
            const idx = Math.floor(finalAngle / ((Math.PI * 2) / names.length)) % names.length;
            
            // PHÁT THẬT: Khi dừng quay, đẩy volume lên 1 và phát tiếng vỗ tay
            applaudAudio.volume = 1.0;
            applaudAudio.play();
            
            confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });
            Swal.fire({
                title: '🎉 CHÚC MỪNG 🎉',
                html: `<b style="font-size:34px; color:#ff3d71">${names[idx]}</b>`,
                icon: 'success',
                showCancelButton: true, confirmButtonText: 'Loại người này', cancelButtonText: 'Giữ lại',
                confirmButtonColor: '#db2449', cancelButtonColor: '#243b63',
                background: '#0f1f38', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) { names.splice(idx, 1); inputNames.value = names.join('\n'); update(); }
            });
        }, 9600);
    }

    function update() { names = inputNames.value.split('\n').map(t => t.trim()).filter(t => t); document.getElementById('count').innerText = names.length; localStorage.setItem('fv_app_v1', inputNames.value); draw(); }
    function shuffleNames() { names.sort(() => Math.random() - 0.5); inputNames.value = names.join('\n'); update(); }
    function resetDefault() { if(isSpinning) return; inputNames.value = defaultData; update(); }
    function clearAll() { if(isSpinning) return; inputNames.value = ""; update(); }
    function buildLEDs() { ledContainer.innerHTML = ''; const rect = document.getElementById('outerFrame').getBoundingClientRect(); for (let i = 0; i < 24; i++) { const led = document.createElement('div'); led.className = 'led'; led.style.transform = `translateX(-50%) rotate(${i * 15}deg)`; led.style.transformOrigin = `50% ${rect.width/2 - 2}px`; ledContainer.appendChild(led); } }
    
    document.getElementById('btn-msg').onclick = () => { const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent); window.open(isMobile ? 'https://m.me/FontVietLinh' : 'https://www.facebook.com/messages/t/FontVietLinh', '_blank'); };
    spinBtn.onclick = spin; inputNames.oninput = update; window.addEventListener('resize', buildLEDs);
    const saved = localStorage.getItem('fv_app_v1'); inputNames.value = saved || defaultData; update(); setTimeout(buildLEDs, 300);
</script>
</body>
</html>
