<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - Font Việt Linh</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #050a14;
            --primary: #36d7ff;
            --gold: #ffb703;
            --panel: rgba(15, 31, 56, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top, #0f1f38, #050a14);
        }
        header { padding: 30px 20px 10px; text-align: center; }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(28px, 5vw, 48px);
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(180deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: flex;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        .wheel-section {
            flex: 1.4;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .wheel-outer {
            position: relative;
            width: min(82vh, 620px);
            height: min(82vh, 620px);
            background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            border-radius: 50%;
            padding: 12px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .led-container { position: absolute; inset: 0; border-radius: 50%; z-index: 5; pointer-events: none; }
        .led {
            position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%;
            top: 2px; left: 50%; transform: translateX(-50%);
            transform-origin: 50% 310px; 
            box-shadow: 0 0 10px #fff, 0 0 15px var(--gold);
            animation: led-blink 0.8s infinite alternate;
        }
        @keyframes led-blink { 0% { opacity: 0.4; } 100% { opacity: 1; filter: brightness(1.3); } }

        .canvas-wrap { width: 100%; height: 100%; background: #0d1d35; border-radius: 50%; overflow: hidden; }
        canvas { 
            width: 100%; height: 100%; display: block; will-change: transform; 
            /* Chuyển động mượt tự nhiên hơn ở giai đoạn dừng */
            transition: transform 6s cubic-bezier(0.15, 0, 0, 1); 
        }

        /* POINTER - Cân đối cho PC */
        .pointer {
            position: absolute; top: 50%; right: -25px; transform: translateY(-50%);
            width: 75px; height: 50px; background: linear-gradient(to left, #ff3d71, #aa1238);
            clip-path: polygon(0 50%, 100% 0, 100% 100%); z-index: 10;
            filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.3));
        }
        .spin-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; background: radial-gradient(circle at 30% 30%, #fff, var(--gold));
            border: 5px solid #fff; border-radius: 50%; cursor: pointer; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: #3a2100;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); transition: 0.2s;
        }
        .spin-btn:active { transform: translate(-50%, -50%) scale(0.9); }

        .sidebar { flex: 0.8; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 22px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .card h3 { font-family: 'Barlow Condensed'; margin-bottom: 12px; letter-spacing: 1px; }
        
        textarea {
            width: 100%; height: 220px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; color: #fff; font-size: 15px; outline: none; resize: none; line-height: 1.6;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn-main { grid-column: span 2; background: var(--primary); color: #000; font-size: 14px; }
        .btn-sec { background: rgba(255,255,255,0.08); color: #fff; }

        .links-group { display: flex; flex-direction: column; gap: 10px; }
        .link-item {
            display: block; padding: 14px; background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff;
            text-decoration: none; text-align: center; font-weight: 700; font-size: 13px; transition: 0.2s;
        }
        .link-item:hover { border-color: var(--primary); background: rgba(54, 215, 255, 0.1); }

        /* ĐIỀU CHỈNH MOBILE */
        @media (max-width: 1100px) {
            .main-container { flex-direction: column; }
            .wheel-outer { width: 88vw; height: 88vw; }
            .led { transform-origin: 50% 43vw; }
            /* Thu nhỏ mũi tên cho cân đối trên điện thoại */
            .pointer { width: 55px; height: 35px; right: -15px; }
            .sidebar { max-width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vòng Quay May Mắn Font Việt Linh</h1>
</header>

<main class="main-container">
    <div class="wheel-section">
        <div class="wheel-outer">
            <div class="led-container" id="ledContainer"></div>
            <div class="canvas-wrap"><canvas id="wheelCanvas" width="800" height="800"></canvas></div>
            <div class="pointer" id="pointer"></div>
            <div class="spin-btn" id="spinBtn">QUAY</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h3>DANH SÁCH <span id="count" style="color:var(--primary)">0</span></h3>
            <textarea id="inputNames" placeholder="Nhập mỗi mục một dòng..."></textarea>
            <div class="btn-group">
                <button class="btn btn-main" onclick="shuffleNames()">Xáo trộn danh sách</button>
                <button class="btn btn-sec" onclick="resetDefault()">Mặc định</button>
                <button class="btn btn-sec" onclick="clearAll()">Xóa hết</button>
            </div>
        </div>

        <div class="card links-group">
            <a href="https://docs.google.com/spreadsheets/d/1FJZfdUx50TFt2mWM11f9i2Lm8f2Bsxum/edit" target="_blank" class="link-item">📚 Bộ font Việt Hoá 4500 Font</a>
            <a href="https://docs.google.com/spreadsheets/d/1LCw8ESaDGv3I9PAAimqbUHFhhIUR6CWmPdkkwObyQYY/edit" target="_blank" class="link-item">🔥 Bộ font Việt hoá Tháng 1-T6/2026</a>
            <a href="#" id="btn-msg" class="link-item" style="color: #ff7aa2;">💬 Nhắn tin cho Font Việt Linh</a>
        </div>
    </div>
</main>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const inputNames = document.getElementById('inputNames');
    const pointer = document.getElementById('pointer');
    const spinBtn = document.getElementById('spinBtn');

    const colors = ["#FF5A5F", "#3BCEAC", "#FFC857", "#2D93AD", "#9B5DE5", "#F15BB5", "#00BBF9", "#00F5D4", "#FCA311", "#E01A4F", "#06D6A0", "#118AB2"];
    const defaultData = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi";
    let names = [];
    let currentRotation = 0;
    let isSpinning = false;

    // Khởi tạo LED
    for (let i = 0; i < 24; i++) {
        const led = document.createElement('div');
        led.className = 'led';
        led.style.transform = `translateX(-50%) rotate(${i * 15}deg)`;
        led.style.animationDelay = `${i * 0.1}s`;
        document.getElementById('ledContainer').appendChild(led);
    }

    // Âm thanh
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(850, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        pointer.style.transform = 'translateY(-50%) rotate(12deg)';
        setTimeout(() => pointer.style.transform = 'translateY(-50%) rotate(0deg)', 40);
    }

    function draw() {
        ctx.fillStyle = "#0d1d35"; ctx.fillRect(0, 0, 800, 800);
        if (names.length === 0) return;
        const slice = (Math.PI * 2) / names.length;
        names.forEach((name, i) => {
            const angle = i * slice;
            ctx.beginPath(); ctx.moveTo(400, 400); ctx.arc(400, 400, 390, angle, angle + slice);
            ctx.fillStyle = colors[i % colors.length]; ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
            ctx.save(); ctx.translate(400, 400); ctx.rotate(angle + slice / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "#fff";
            ctx.font = '900 38px "Barlow Condensed", sans-serif';
            ctx.fillText(name.substring(0, 15), 345, 12); ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || names.length === 0) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isSpinning = true;
        const rounds = 8 + Math.floor(Math.random() * 5); // Tăng số vòng quay để mượt hơn
        const stopAngle = Math.random() * Math.PI * 2;
        currentRotation += (rounds * Math.PI * 2) + stopAngle;
        canvas.style.transform = `rotate(${currentRotation}rad)`;

        let lastIdx = -1;
        const startTime = performance.now();
        const duration = 6000; // Khớp với CSS transition (6s)

        function checkTick(now) {
            if (!isSpinning) return;
            const progress = (now - startTime) / duration;
            if (progress < 1) {
                // Sử dụng hàm Power để khớp với cubic-bezier dừng chậm
                const easeOut = 1 - Math.pow(1 - progress, 4);
                const currentDeg = (currentRotation * easeOut * 180) / Math.PI;
                const sliceDeg = 360 / names.length;
                const currentIdx = Math.floor(currentDeg / sliceDeg);
                if (currentIdx !== lastIdx) { playTick(); lastIdx = currentIdx; }
                requestAnimationFrame(checkTick);
            }
        }
        requestAnimationFrame(checkTick);

        setTimeout(() => {
            isSpinning = false;
            const final = currentRotation % (Math.PI * 2);
            const slice = (Math.PI * 2) / names.length;
            const idx = Math.floor((Math.PI * 2 - (final % (Math.PI * 2))) / slice) % names.length;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            Swal.fire({
                title: '🎉 CHÚC MỪNG 🎉',
                html: `<b style="font-size:32px; color:#ff3d71">${names[idx]}</b>`,
                icon: 'success',
                showCancelButton: true,
                confirmButtonText: 'Loại người này',
                cancelButtonText: 'Giữ lại',
                confirmButtonColor: '#db2449',
                cancelButtonColor: '#243b63',
                background: '#0f1f38', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) {
                    names.splice(idx, 1);
                    inputNames.value = names.join('\n');
                    update();
                }
            });
        }, 6100);
    }

    function update() {
        names = inputNames.value.split('\n').map(t => t.trim()).filter(t => t);
        document.getElementById('count').innerText = names.length;
        localStorage.setItem('fv_wheel_v4', inputNames.value);
        draw();
    }
    function shuffleNames() { names.sort(() => Math.random() - 0.5); inputNames.value = names.join('\n'); update(); }
    function resetDefault() { inputNames.value = defaultData; update(); }
    function clearAll() { inputNames.value = ""; update(); }

    document.getElementById('btn-msg').onclick = (e) => {
        e.preventDefault();
        const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
        window.open(isMobile ? 'https://m.me/FontVietLinh' : 'https://www.facebook.com/messages/t/FontVietLinh', '_blank');
    };

    spinBtn.onclick = spin;
    inputNames.oninput = update;
    const saved = localStorage.getItem('fv_wheel_v4');
    inputNames.value = saved || defaultData;
    update();
</script>
</body>
</html>
