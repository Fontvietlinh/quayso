<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vòng Quay May Mắn - Font Việt Linh</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #36d7ff;
            --bg: #07111f;
            --panel: rgba(15, 31, 56, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #162b4d, #07111f);
            overflow-x: hidden;
        }
        header { padding: 20px; text-align: center; }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(24px, 5vw, 42px);
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #36d7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .main-container {
            display: flex;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 10px 20px 40px;
            gap: 40px;
            align-items: center;
        }
        .wheel-box {
            flex: 1.2;
            display: flex;
            justify-content: center;
            position: relative;
        }
        .wheel-wrapper {
            position: relative;
            width: min(80vw, 520px);
            height: min(80vw, 520px);
            border-radius: 50%;
            padding: 12px;
            background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.5);
        }
        .canvas-container {
            width: 100%;
            height: 100%;
            background: #0d1d35;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            will-change: transform;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .pointer {
            position: absolute;
            top: 50%; right: -25px;
            transform: translateY(-50%);
            width: 60px; height: 45px;
            background: linear-gradient(to left, #ff3d71, #aa1238);
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            z-index: 10;
        }
        .center-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85px; height: 85px;
            background: radial-gradient(circle, #fff, #ffb703);
            border: 4px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; font-size: 20px; color: #3a2100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .sidebar {
            flex: 0.8;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
        }
        textarea {
            width: 100%; height: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px; color: #fff;
            font-size: 16px; outline: none; resize: none;
            line-height: 1.5;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 14px; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px;
            transition: 0.2s;
        }
        .btn-main { grid-column: span 2; background: #00f5d4; color: #000; }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; }
        .btn:active { transform: scale(0.96); }
        
        @media (max-width: 1000px) {
            .main-container { flex-direction: column; padding: 10px; }
            .sidebar { max-width: 100%; }
            .wheel-wrapper { width: 85vw; height: 85vw; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vòng Quay May Mắn Font Việt Linh</h1>
</header>

<main class="main-container">
    <div class="wheel-box">
        <div class="wheel-wrapper">
            <div class="canvas-container">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
            </div>
            <div class="pointer" id="pointer"></div>
            <div class="center-button" id="spinBtn">QUAY</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="font-family:'Barlow Condensed'">DANH SÁCH THAM GIA</h3>
                <span id="count" style="color:var(--primary); font-weight:900;">0</span>
            </div>
            <textarea id="inputNames" placeholder="Nhập tên, mỗi dòng một người..."></textarea>
            <div class="btn-group">
                <button class="btn btn-main" onclick="shuffleNames()">XÁO TRỘN DANH SÁCH</button>
                <button class="btn btn-sec" onclick="resetDefault()">MẶC ĐỊNH</button>
                <button class="btn btn-sec" onclick="clearAll()">XÓA HẾT</button>
            </div>
        </div>
    </div>
</main>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const inputNames = document.getElementById('inputNames');
    const spinBtn = document.getElementById('spinBtn');
    const pointer = document.getElementById('pointer');

    const colors = ["#FF5A5F", "#3BCEAC", "#FFC857", "#2D93AD", "#9B5DE5", "#F15BB5", "#00BBF9", "#00F5D4", "#FCA311", "#E01A4F", "#06D6A0", "#118AB2"];
    const defaultData = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi";
    
    let names = [];
    let currentRotation = 0;
    let isSpinning = false;

    // Khởi tạo âm thanh
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        
        pointer.style.transform = 'translateY(-50%) rotate(15deg)';
        setTimeout(() => pointer.style.transform = 'translateY(-50%) rotate(0deg)', 50);
    }

    function draw() {
        const size = 800;
        const cx = 400, cy = 400, r = 385;
        ctx.fillStyle = "#0d1d35";
        ctx.fillRect(0, 0, size, size);

        if (names.length === 0) return;
        const slice = (Math.PI * 2) / names.length;

        names.forEach((name, i) => {
            const angle = i * slice;
            // Vẽ miếng
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, angle, angle + slice);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Vẽ chữ
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle + slice / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = '900 40px "Barlow Condensed", sans-serif';
            const displayName = name.length > 14 ? name.substring(0, 12) + '...' : name;
            ctx.fillText(displayName, r - 50, 15);
            ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || names.length === 0) return;
        initAudio();
        isSpinning = true;
        
        const extraRounds = 8 + Math.floor(Math.random() * 5);
        const randomStop = Math.random() * Math.PI * 2;
        currentRotation += (extraRounds * Math.PI * 2) + randomStop;

        canvas.style.transform = `rotate(${currentRotation}rad)`;

        // Giả lập âm thanh dựa trên vận tốc ước tính
        let ticks = 0;
        const totalTicks = 45 + Math.floor(Math.random() * 10);
        for(let i=0; i<totalTicks; i++) {
            const delay = Math.pow(i / totalTicks, 2) * 5000;
            setTimeout(() => { if(isSpinning) playTick(); }, delay);
        }

        setTimeout(() => {
            isSpinning = false;
            const actualAngle = currentRotation % (Math.PI * 2);
            const slice = (Math.PI * 2) / names.length;
            const idx = Math.floor((Math.PI * 2 - (actualAngle % (Math.PI * 2))) / slice) % names.length;

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            Swal.fire({
                title: 'KẾT QUẢ',
                html: `<div style="font-size:32px; font-weight:900; color:#ff3d71">${names[idx]}</div>`,
                icon: 'success',
                showCancelButton: true,
                confirmButtonText: 'Loại người này',
                cancelButtonText: 'Giữ lại',
                confirmButtonColor: '#ff3d71',
                background: '#0f1f38', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) {
                    names.splice(idx, 1);
                    inputNames.value = names.join('\n');
                    update();
                }
            });
        }, 5100);
    }

    function update() {
        names = inputNames.value.split('\n').map(t => t.trim()).filter(t => t);
        document.getElementById('count').innerText = names.length;
        localStorage.setItem('fv_wheel_data', inputNames.value);
        draw();
    }

    function shuffleNames() {
        names.sort(() => Math.random() - 0.5);
        inputNames.value = names.join('\n');
        update();
    }

    function resetDefault() { inputNames.value = defaultData; update(); }
    function clearAll() { inputNames.value = ''; update(); }

    spinBtn.addEventListener('click', spin);
    inputNames.addEventListener('input', update);

    // Khởi tạo
    const saved = localStorage.getItem('fv_wheel_data');
    inputNames.value = saved || defaultData;
    update();
</script>
</body>
</html>
