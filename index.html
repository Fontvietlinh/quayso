<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay may mắn Font Việt Linh</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Be+Vietnam+Pro:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #07111f;
            --panel: rgba(12,24,44,0.85);
            --panel-border: rgba(255,255,255,0.09);
            --text: #eef4ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Be Vietnam Pro', sans-serif; }
        html, body { min-height: 100%; background: #07111f; }
        body {
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 18% 14%, rgba(54,215,255,0.15), transparent 26%),
                radial-gradient(circle at 82% 10%, rgba(124,92,255,0.18), transparent 28%),
                linear-gradient(135deg, #07111f 0%, #0f1f38 50%, #162b4d 100%);
        }
        header { padding: 24px 20px 8px; text-align: center; }
        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(26px, 4vw, 48px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 4px 15px rgba(124,92,255,0.4);
        }
        .container {
            display: flex;
            flex: 1;
            padding: 10px 20px 30px;
            gap: 30px;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
            align-items: center;
            justify-content: center;
        }
        .wheel-section { flex: 1; display: flex; justify-content: center; position: relative; }
        .wheel-stage {
            position: relative;
            width: min(75vh, 550px);
            height: min(75vh, 550px);
        }
        .wheel-rim {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#fff5c2, #ffcb52, #ff9f1c, #ffd76a, #fff5c2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.5);
            z-index: 1;
        }
        .wheel-canvas-wrap {
            position: absolute;
            inset: 7%;
            border-radius: 50%;
            overflow: hidden;
            background: #0d1d35;
            z-index: 2;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            will-change: transform;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
        }
        .pointer {
            position: absolute;
            top: 50%;
            right: -15px;
            transform: translateY(-50%);
            width: 70px;
            height: 45px;
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            background: linear-gradient(145deg, #ff7aa2, #aa1238);
            z-index: 10;
            filter: drop-shadow(-5px 5px 5px rgba(0,0,0,0.3));
        }
        .spin-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 100px; height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff8da, #ffb703);
            border: 5px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; font-size: 22px; color: #3a2100;
            cursor: pointer; z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .spin-btn:active { transform: translate(-50%,-45%) scale(0.95); }

        .sidebar { width: 340px; display: flex; flex-direction: column; gap: 15px; }
        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%; height: 250px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px; color: #fff;
            resize: none; outline: none; line-height: 1.6;
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 12px; border: none; border-radius: 10px;
            color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px;
        }
        .btn-shuffle { grid-column: span 2; background: #16d9c0; }
        .btn-reset { background: #f07d16; }
        .btn-clear { background: #db2449; }
        .links-section a {
            display: block; padding: 12px; margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; text-decoration: none; color: #fff;
            text-align: center; font-size: 13px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 1100px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-width: 500px; }
            .wheel-stage { width: 85vw; height: 85vw; max-width: 450px; max-height: 450px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Vòng Quay May Mắn Font Việt Linh</h1>
</header>

<main class="container">
    <div class="wheel-section">
        <div class="wheel-stage">
            <div class="wheel-rim"></div>
            <div class="wheel-canvas-wrap">
                <canvas id="canvas" width="800" height="800"></canvas>
            </div>
            <div class="pointer" id="pointer"></div>
            <div class="spin-btn" id="spin-btn">QUAY</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="input-section glass-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <h2 style="font-family:'Barlow Condensed'; letter-spacing:1px;">DANH SÁCH</h2>
                <span id="entry-count" style="background:#36d7ff; color:#000; padding:2px 10px; border-radius:10px; font-weight:900;">0</span>
            </div>
            <textarea id="names-input" placeholder="Mỗi tên một dòng..."></textarea>
            <div class="controls">
                <button class="btn btn-shuffle" id="shuffle-btn">Xáo trộn</button>
                <button class="btn btn-reset" id="reset-btn">Mặc định</button>
                <button class="btn btn-clear" id="clear-btn">Xóa hết</button>
            </div>
        </div>
        <div class="links-section glass-card">
            <a href="https://docs.google.com/spreadsheets/d/1FJZfdUx50TFt2mWM11f9i2Lm8f2Bsxum/edit" target="_blank">📚 4500 Font Việt Hoá</a>
            <a href="https://www.facebook.com/FontVietLinh" target="_blank">💬 Liên hệ hỗ trợ</a>
        </div>
    </div>
</main>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const namesInput = document.getElementById('names-input');
    const entryCount = document.getElementById('entry-count');
    const spinBtn = document.getElementById('spin-btn');
    const pointer = document.getElementById('pointer');

    const colors = ["#FF5A5F","#3BCEAC","#FFC857","#2D93AD","#9B5DE5","#F15BB5","#00BBF9","#00F5D4","#FCA311","#E01A4F","#06D6A0","#118AB2"];
    const defaultNames = "Tý\nSửu\nDần\nMão\nThìn\nTỵ\nNgọ\nMùi\nThân\nDậu\nTuất\nHợi";

    let names = [];
    let currentAngle = 0;
    let isSpinning = false;

    // Âm thanh
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        
        pointer.style.transform = 'translateY(-50%) rotate(15deg)';
        setTimeout(() => pointer.style.transform = 'translateY(-50%) rotate(0deg)', 40);
    }

    function drawWheel() {
        const cx = 400, cy = 400, r = 390;
        ctx.clearRect(0, 0, 800, 800);
        if (names.length === 0) return;

        const slice = (Math.PI * 2) / names.length;
        names.forEach((name, i) => {
            const angle = i * slice;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, r, angle, angle + slice);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.stroke();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle + slice / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = '900 38px "Barlow Condensed", sans-serif';
            ctx.fillText(name.length > 15 ? name.substring(0,12)+'...' : name, r - 50, 12);
            ctx.restore();
        });
    }

    function spin() {
        if (isSpinning || names.length === 0) return;
        isSpinning = true;
        
        const rounds = 7 + Math.floor(Math.random() * 5);
        const extraAngle = Math.random() * Math.PI * 2;
        currentAngle += (rounds * Math.PI * 2) + extraAngle;

        canvas.style.transform = `rotate(${currentAngle}rad)`;

        // Giả lập tiếng tick
        let lastTick = 0;
        const totalDuration = 5000;
        const start = performance.now();
        
        function tickEffect(now) {
            const elapsed = now - start;
            if (elapsed < totalDuration) {
                const progress = elapsed / totalDuration;
                const currentStep = Math.floor(progress * 50); // giả lập số lần tạch
                if (currentStep !== lastTick) {
                    playTick();
                    lastTick = currentStep;
                }
                requestAnimationFrame(tickEffect);
            }
        }
        requestAnimationFrame(tickEffect);

        setTimeout(() => {
            isSpinning = false;
            const final = currentAngle % (Math.PI * 2);
            const slice = (Math.PI * 2) / names.length;
            const idx = Math.floor((Math.PI * 2 - (final % (Math.PI * 2))) / slice) % names.length;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            Swal.fire({
                title: 'CHÚC MỪNG!',
                html: `<b style="font-size:30px; color:#ff5a5f">${names[idx]}</b>`,
                icon: 'success',
                confirmButtonText: 'Loại bỏ',
                showCancelButton: true,
                cancelButtonText: 'Giữ lại',
                background: '#0f1f38', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) {
                    names.splice(idx, 1);
                    namesInput.value = names.join('\n');
                    update();
                }
            });
        }, 5000);
    }

    function update() {
        names = namesInput.value.split('\n').map(x => x.trim()).filter(x => x);
        entryCount.innerText = names.length;
        localStorage.setItem('wheel_data', namesInput.value);
        drawWheel();
    }

    spinBtn.onclick = spin;
    namesInput.oninput = update;
    document.getElementById('shuffle-btn').onclick = () => {
        names.sort(() => Math.random() - 0.5);
        namesInput.value = names.join('\n');
        update();
    };
    document.getElementById('clear-btn').onclick = () => { namesInput.value = ''; update(); };
    document.getElementById('reset-btn').onclick = () => { namesInput.value = defaultNames; update(); };

    // Khởi tạo
    const saved = localStorage.getItem('wheel_data');
    if (saved) namesInput.value = saved;
    else namesInput.value = defaultNames;
    update();
</script>
</body>
</html>
